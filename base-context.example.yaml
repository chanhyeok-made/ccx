# Example base-context.yaml
# Copy this to your project root and customize

project_name: "my-project"

stack:
  runtime: "Node.js 20"
  framework: "Next.js 14 App Router"
  database: "PostgreSQL + Prisma"

architecture: |
  Next.js App Router 기반.
  src/app/ 아래 route별 구성.
  src/lib/ 에 비즈니스 로직 (서비스 레이어).
  src/components/ 에 공통 UI 컴포넌트.

structure: |
  src/
    app/
      api/
      (auth)/
      (dashboard)/
    lib/
      auth/
      user/
    components/
      ui/
  prisma/
    schema.prisma

exception_rules:
  forbidden:
    - rule: "컴포넌트에서 Prisma 직접 호출 금지"
      reason: "서비스 레이어 분리 원칙"
  required:
    - rule: "모든 API 응답은 { data, error, meta } 형태"
      reason: "프론트엔드 공통 에러 핸들링"
  gotchas:
    - "prisma client는 src/lib/prisma.ts에서만 export"
